version: '3.8'

services:
  shared-db:
    image: postgres:15-alpine
    container_name: shared-db
    environment:
      - POSTGRES_PASSWORD=password123
    volumes:
      - ./infra/shared-init.sql:/docker-entrypoint-initdb.d/shared-init.sql
    networks:
      - lab-net

  nexpartner-app:
    build: ./apps/nexpartner
    container_name: nexpartner-app
    restart: always
    environment:
      - DB_URL=postgres://postgres:password123@shared-db:5432/nexpartner_db
    depends_on:
      - shared-db
    networks:
      - lab-net

  lab-gateway:
    image: nginx:alpine
    container_name: lab-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nexpartner-app
    networks:
      - lab-net

networks:
  lab-net:
    driver: bridge
