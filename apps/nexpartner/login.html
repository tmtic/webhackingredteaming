<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>NexPartner | Login</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-96 border border-gray-200">
        <h1 class="text-2xl font-black text-blue-900 mb-6 text-center">NEXPARTNER</h1>
        <form action="/api/v1/auth/login" method="POST" class="space-y-4">
            <div><label class="block text-xs font-bold text-gray-400 uppercase">Usuário</label>
            <input type="text" name="username" class="w-full p-3 bg-gray-50 border rounded mt-1" required></div>
            <div><label class="block text-xs font-bold text-gray-400 uppercase">Senha</label>
            <input type="password" name="password" class="w-full p-3 bg-gray-50 border rounded mt-1" required></div>
            <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Entrar</button>
        </form>
    </div>
</body></html>
